<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <!-- score sheet: staff-like lines doubling as scoreboard rows -->
  <g stroke="#334155" stroke-width="10" stroke-linecap="round">
    <line x1="104" y1="168" x2="408" y2="168"/>
    <line x1="104" y1="232" x2="408" y2="232"/>
    <line x1="104" y1="296" x2="408" y2="296"/>
    <line x1="104" y1="360" x2="408" y2="360"/>
  </g>
  <!-- eighth note: notehead + stem + flag -->
  <g fill="#38bdf8">
    <ellipse cx="196" cy="356" rx="52" ry="40" transform="rotate(-20 196 356)"/>
    <rect x="236" y="150" width="16" height="206" rx="8"/>
    <path d="M252 150 q70 22 70 92 q0 26 -18 44 q14 -30 -6 -58 q-18 -24 -46 -34 z"/>
  </g>
  <!-- winning tally in gold -->
  <text x="356" y="212" font-family="Arial, sans-serif" font-size="68" font-weight="800" fill="#facc15" text-anchor="middle">21</text>
</svg>
